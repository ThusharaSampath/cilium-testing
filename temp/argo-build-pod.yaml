  - args:
    - |-
      #!/bin/sh
      set -e
      mkdir -p /mnt/vol/podman-storage
      sed -i 's|^graphroot = .*|graphroot = "/mnt/vol/podman-storage"|' /etc/containers/storage.conf
      sed -i 's|^runroot = .*|runroot = "/mnt/vol/podman-storage"|' /etc/containers/storage.conf
      podman system service -t 0 &
      fullPath="/mnt/vol/cilium-testing/service-to-service/project-level/client"
      export IMAGE=imageblueprint
      export DOCKER_API_VERSION=1.44
      AZURE_PS_USERNAME=$(echo $AZURE_PS_CREDS | jq -r '.auths["choreoprivateacr.azurecr.io"].username')
      AZURE_PS_PASSWORD=$(echo $AZURE_PS_CREDS | jq -r '.auths["choreoprivateacr.azurecr.io"].password')
      podman login -u $AZURE_PS_USERNAME -p $AZURE_PS_PASSWORD choreoprivateacr.azurecr.io
      _PROXY_DIR="/mnt/proxy-config"

      # Read a proxy config value: strategy-specific first, then global
      _proxy_val() {
        local strategy="$1" key="$2" val=""
        [ -n "$strategy" ] && [ -f "$_PROXY_DIR/${strategy}.${key}" ] && val=$(cat "$_PROXY_DIR/${strategy}.${key}" | tr -d '\n')
        [ -z "$val" ] && [ -f "$_PROXY_DIR/${key}" ] && val=$(cat "$_PROXY_DIR/${key}" | tr -d '\n')
        echo "$val"
      }

      # Resolve an image ref: check full override first, then OCI mirror swap
      _resolve_image() {
        local strategy="$1" img_key="$2" oci_key="$3" original="$4"
        local override=$(_proxy_val "$strategy" "$img_key")
        if [ -n "$override" ]; then
          local _basename="${override##*/}"
          if [ "$_basename" = "${_basename%:*}" ] && [ "$_basename" = "${_basename%@*}" ]; then
            if echo "$original" | grep -q '@sha256:'; then
              echo "${override}@${original##*@}"
            elif echo "$original" | grep -q ':'; then
              echo "${override}:${original##*:}"
            else
              echo "$override"
            fi
          else
            echo "$override"
          fi
          return
        fi
        local mirror=$(_proxy_val "$strategy" "$oci_key")
        if [ -n "$mirror" ]; then
          echo "$mirror/${original#*/}"
          return
        fi
        echo "$original"
      }
      _proxy_login() {
        local strategy="$1"
        for mirror in dockerhub choreo buildpacks; do
          local url=$(_proxy_val "$strategy" "oci-${mirror}-url")
          local user=$(_proxy_val "$strategy" "oci-${mirror}-username")
          local pass=$(_proxy_val "$strategy" "oci-${mirror}-password")
          if [ -n "$url" ] && [ -n "$user" ]; then
            echo "Logging into proxy mirror: ${url%%/*}"
            podman login "${url%%/*}" -u "$user" -p "$pass"
          fi
        done
      }
      _setup_maven_proxy() {
        local strategy="$1"
        local url=$(_proxy_val "$strategy" pkg-maven-url)
        [ -z "$url" ] && return
        local user=$(_proxy_val "$strategy" pkg-maven-username)
        local pass=$(_proxy_val "$strategy" pkg-maven-password)
        mkdir -p /tmp/maven-proxy-binding
        echo "maven" > /tmp/maven-proxy-binding/type
        cat > /tmp/maven-proxy-binding/settings.xml <<MVNEOF
      <?xml version="1.0" encoding="UTF-8"?>
      <settings>
        <mirrors>
          <mirror>
            <id>proxy-mirror</id>
            <mirrorOf>*</mirrorOf>
            <url>${url}</url>
          </mirror>
        </mirrors>
      $(if [ -n "$user" ]; then
      cat <<AUTHEOF
        <servers>
          <server>
            <id>proxy-mirror</id>
            <username>${user}</username>
            <password>${pass}</password>
          </server>
        </servers>
      AUTHEOF
      fi)
      </settings>
      MVNEOF
        _MAVEN_BINDING="--volume /tmp/maven-proxy-binding:/platform/bindings/maven-settings"
        mkdir -p /tmp/maven-user-settings
        cp /tmp/maven-proxy-binding/settings.xml /tmp/maven-user-settings/settings.xml
        _MAVEN_USER_SETTINGS="--volume /tmp/maven-user-settings/settings.xml:/home/cnb/.m2/settings.xml:ro"
        _LANG_ENV="$_LANG_ENV --env GOOGLE_BUILD_ARGS=--settings=/platform/bindings/maven-settings/settings.xml"
      }
      _setup_gradle_proxy() {
        local strategy="$1"
        local url=$(_proxy_val "$strategy" pkg-gradle-url)
        [ -z "$url" ] && return
        local user=$(_proxy_val "$strategy" pkg-gradle-username)
        local pass=$(_proxy_val "$strategy" pkg-gradle-password)
        mkdir -p /tmp/gradle-proxy-binding
        if [ -n "$user" ]; then
          cat > /tmp/gradle-proxy-binding/init.gradle <<GRDEOF
      allprojects {
        repositories {
          clear()
          maven {
            url "${url}"
            credentials {
              username = "${user}"
              password = "${pass}"
            }
          }
        }
      }
      GRDEOF
        else
          cat > /tmp/gradle-proxy-binding/init.gradle <<GRDEOF
      allprojects {
        repositories {
          clear()
          maven { url "${url}" }
        }
      }
      GRDEOF
        fi
        _LANG_VOLUMES="$_LANG_VOLUMES --volume /tmp/gradle-proxy-binding/init.gradle:/tmp/gradle-proxy-binding/init.gradle"
        _LANG_ENV="$_LANG_ENV --env GOOGLE_BUILD_ARGS=--init-script=/tmp/gradle-proxy-binding/init.gradle"
      }
      _setup_nuget_proxy() {
        local strategy="$1"
        local url=$(_proxy_val "$strategy" pkg-nuget-url)
        [ -z "$url" ] && return
        local user=$(_proxy_val "$strategy" pkg-nuget-username)
        local pass=$(_proxy_val "$strategy" pkg-nuget-password)
        mkdir -p /tmp/nuget-proxy-config
        if [ -n "$user" ]; then
          cat > /tmp/nuget-proxy-config/NuGet.Config <<NGEOF
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="proxy-mirror" value="${url}" />
        </packageSources>
        <packageSourceCredentials>
          <proxy-mirror>
            <add key="Username" value="${user}" />
            <add key="ClearTextPassword" value="${pass}" />
          </proxy-mirror>
        </packageSourceCredentials>
      </configuration>
      NGEOF
        else
          cat > /tmp/nuget-proxy-config/NuGet.Config <<NGEOF
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="proxy-mirror" value="${url}" />
        </packageSources>
      </configuration>
      NGEOF
        fi
        _LANG_VOLUMES="$_LANG_VOLUMES --volume /tmp/nuget-proxy-config/NuGet.Config:/home/cnb/.nuget/NuGet/NuGet.Config"
      }
      _proxy_login buildpack
      _RUN_IMAGE=$(_resolve_image buildpack image-buildpacks-run-ref oci-buildpacks-url "choreoprivateacr.azurecr.io/buildpacks/google-22/run:2941124e39ef19f49aabac4257daf5f652805e81")
      _LIFECYCLE_IMAGE=$(_resolve_image buildpack image-buildpacks-lifecycle-ref oci-buildpacks-url "choreoprivateacr.azurecr.io/buildpacksio/lifecycle:0.20.2")
      _BUILDER_IMAGE=$(_resolve_image buildpack image-buildpacks-builder-ref oci-buildpacks-url "choreoprivateacr.azurecr.io/buildpacks/builder:google-22")
      _BUILDER_DIGEST=$(_resolve_image buildpack image-buildpacks-builder-ref oci-buildpacks-url "choreoprivateacr.azurecr.io/buildpacks/builder:google-22@sha256:68d26d7aa7232407fb9fcffcfa32daa2dce52627b24a910ac85239d0f293f618")
      _BUILDPACK_IMAGE=$(_resolve_image buildpack image-buildpacks-builder-ref oci-buildpacks-url "")
      _LIFECYCLE_CACHE=$(echo "$_LIFECYCLE_IMAGE" | tr ':/' '__')
      _BUILDER_CACHE=$(echo "$_BUILDER_DIGEST" | tr ':/' '__')
      _RUN_CACHE=$(echo "$_RUN_IMAGE" | tr ':/' '__')
      if [[ -f "/mnt/podman-cache/${_LIFECYCLE_CACHE}.tar" ]]; then
        echo 'lifecycleImage already exists in cache'
        podman load -i /mnt/podman-cache/${_LIFECYCLE_CACHE}.tar
      else
        echo 'pulling lifecycleImage'
        podman pull "$_LIFECYCLE_IMAGE"
      fi
      if [[ -f "/mnt/podman-cache/${_BUILDER_CACHE}.tar" ]]; then
        echo 'buildpacksBuilderImage already exists in cache'
        podman load -i /mnt/podman-cache/${_BUILDER_CACHE}.tar
      else
        echo 'pulling buildpacksBuilderImage'
        podman pull "$_BUILDER_DIGEST"
        podman tag "$_BUILDER_DIGEST" "$_BUILDER_IMAGE"
      fi
      if [[ -f "/mnt/podman-cache/${_RUN_CACHE}.tar" ]]; then
        echo 'runImage already exists in cache'
        podman load -i /mnt/podman-cache/${_RUN_CACHE}.tar
      else
        echo 'pulling runImage'
        podman pull "$_RUN_IMAGE"
      fi
      pack config lifecycle-image "$_LIFECYCLE_IMAGE"
      _LANG_ENV=""
      _LANG_VOLUMES=""
      _MAVEN_BINDING=""
      _V=$(_proxy_val buildpack pkg-python-url)
      if [ -n "$_V" ]; then
        _PY_USER=$(_proxy_val buildpack pkg-python-username)
        _PY_PASS=$(_proxy_val buildpack pkg-python-password)
        if [ -n "$_PY_USER" ]; then
          _SCHEME="${_V%%://*}"
          _REST="${_V#*://}"
          _V="${_SCHEME}://${_PY_USER}:${_PY_PASS}@${_REST}"
        fi
        _LANG_ENV="$_LANG_ENV --env PIP_INDEX_URL=$_V"
      fi
      _V=$(_proxy_val buildpack pkg-go-url)
      if [ -n "$_V" ]; then
        _LANG_ENV="$_LANG_ENV --env GOPROXY=$_V"
        _GO_USER=$(_proxy_val buildpack pkg-go-username)
        _GO_PASS=$(_proxy_val buildpack pkg-go-password)
        if [ -n "$_GO_USER" ]; then
          _NOSCHEME="${_V#*://}"
          _HOST="${_NOSCHEME%%/*}"
          mkdir -p /tmp/go-proxy-auth
          printf "machine %s\nlogin %s\npassword %s\n" "$_HOST" "$_GO_USER" "$_GO_PASS" > /tmp/go-proxy-auth/.netrc
          _LANG_VOLUMES="$_LANG_VOLUMES --volume /tmp/go-proxy-auth/.netrc:/home/cnb/.netrc"
          _LANG_ENV="$_LANG_ENV --env GONOSUMDB=*"
        fi
      fi
      _V=$(_proxy_val buildpack pkg-npm-url)
      if [ -n "$_V" ]; then
        _LANG_ENV="$_LANG_ENV --env NPM_CONFIG_REGISTRY=$_V"
        _NPM_TOKEN=$(_proxy_val buildpack pkg-npm-token)
        if [ -n "$_NPM_TOKEN" ]; then
          _NOSCHEME="${_V#*://}"
          _HOST="${_NOSCHEME%%/*}"
          mkdir -p /tmp/npm-proxy-auth
          printf "//${_HOST}/:_authToken=${_NPM_TOKEN}\n" > /tmp/npm-proxy-auth/.npmrc
          _LANG_VOLUMES="$_LANG_VOLUMES --volume /tmp/npm-proxy-auth/.npmrc:/home/cnb/.npmrc"
        fi
      fi
      _setup_maven_proxy buildpack
      _setup_gradle_proxy buildpack
      _setup_nuget_proxy buildpack
      _V=$(_proxy_val buildpack pkg-composer-url)
      if [ -n "$_V" ]; then
        _NOSCHEME="${_V#*://}"
        _HOST="${_NOSCHEME%%/*}"
        if [ -f "$fullPath/composer.json" ]; then
          _TMP=$(mktemp)
          jq --arg url "$_V" '.repositories = [{"type":"composer","url":$url},{"packagist.org":false}] + (.repositories // [])' "$fullPath/composer.json" > "$_TMP"
          mv "$_TMP" "$fullPath/composer.json"
        fi
        _COMPOSER_USER=$(_proxy_val buildpack pkg-composer-username)
        _COMPOSER_PASS=$(_proxy_val buildpack pkg-composer-password)
        if [ -n "$_COMPOSER_USER" ]; then
          printf '{"http-basic":{"%s":{"username":"%s","password":"%s"}}}' "$_HOST" "$_COMPOSER_USER" "$_COMPOSER_PASS" > "$fullPath/auth.json"
        fi
      fi
      _V=$(_proxy_val buildpack pkg-rubygems-url)
      if [ -n "$_V" ]; then
        if [ -f "$fullPath/Gemfile" ]; then
          _TMP=$(mktemp)
          sed "s|https://rubygems.org[/]*|$_V|g" "$fullPath/Gemfile" > "$_TMP"
          mv "$_TMP" "$fullPath/Gemfile"
          _RUBY_USER=$(_proxy_val buildpack pkg-rubygems-username)
          _RUBY_PASS=$(_proxy_val buildpack pkg-rubygems-password)
          if [ -n "$_RUBY_USER" ]; then
            _NOSCHEME="${_V#*://}"
            _HOST="${_NOSCHEME%%/*}"
            _BUNDLE_HOST=$(echo "$_HOST" | sed 's/\./__/g; s/-/___/g' | tr '[:lower:]' '[:upper:]')
            _LANG_ENV="$_LANG_ENV --env BUNDLE_${_BUNDLE_HOST}=${_RUBY_USER}:${_RUBY_PASS}"
          fi
        fi
      fi
      if [ -z "" ]; then
      pack build $IMAGE --docker-host=inherit --builder "$_BUILDER_IMAGE" --env "GOOGLE_GO_VERSION=1.x" --env "GOOGLE_RUNTIME_IMAGE_REGION=us" --path $fullPath --run-image="$_RUN_IMAGE" $_LANG_ENV $_LANG_VOLUMES $_MAVEN_BINDING --volume "$(pwd)/generated-artifacts":/app/generated-artifacts:rw --pull-policy if-not-present
      else
      pack build $IMAGE --docker-host=inherit --builder "$_BUILDER_IMAGE" --env "GOOGLE_GO_VERSION=1.x" --env "GOOGLE_RUNTIME_IMAGE_REGION=us" --path $fullPath --buildpack="$_BUILDPACK_IMAGE" --run-image="$_RUN_IMAGE" $_LANG_ENV $_LANG_VOLUMES $_MAVEN_BINDING --volume "$(pwd)/generated-artifacts":/app/generated-artifacts:rw --pull-policy if-not-present
      fi
      podman tag imageblueprint choreo/app-image:latest
      podman save -o /mnt/vol/app-image.tar choreo/app-image:latest
      podman logout choreoprivateacr.azurecr.io
