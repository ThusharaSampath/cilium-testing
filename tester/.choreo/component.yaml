schemaVersion: 1.2

endpoints:
  - name: tester
    displayName: Tester Service
    service:
      basePath: /
      port: 8080
    type: REST
    networkVisibilities:
      - Public
    schemaFilePath: openapi.yaml

dependencies:
    connectionReferences:
    - name: tester-to-org
      resourceRef: service:/bhvy/org-service/v1/5c69c/ORGANIZATION
    - name: tester-to-public
      resourceRef: service:/bhvy/public-service/v1/5c69c/PUBLIC
    - name: tester-to-project
      resourceRef: service:/bhvy/project-service/v1/5c69c/PROJECT