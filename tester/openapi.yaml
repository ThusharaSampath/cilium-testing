openapi: 3.0.3
info:
  title: tester
  version: "1.0"
paths:
  /test:
    get:
      summary: Call all services and return results
      responses:
        "200":
          description: Aggregated results from org, public, and project services
  /test/org:
    get:
      summary: Test org-service connectivity
      responses:
        "200":
          description: Result from org-service
  /test/public:
    get:
      summary: Test public-service connectivity
      responses:
        "200":
          description: Result from public-service
  /test/project:
    get:
      summary: Test project-service connectivity
      responses:
        "200":
          description: Result from project-service
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
